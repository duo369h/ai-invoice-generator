name: UI Enforcement Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  enforce-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Run Lint
        run: npm run lint
      - name: Run UI Guard
        run: node scripts/ui-guard.js
      - name: Run Build Test
        run: npm run build
